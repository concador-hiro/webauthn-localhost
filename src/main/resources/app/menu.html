<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAuthn Servlet Demo - Menu</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 16px auto; padding: 0 10px; line-height: 1.45; }
    h1 { margin: 0 0 10px; }
    h2 { margin: 0 0 10px; }
    p { margin: 8px 0 0; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
    button { margin-top: 10px; padding: 9px 14px; cursor: pointer; }
    .status { white-space: pre-wrap; background: #f7f7f7; border: 1px solid #ddd; padding: 10px; border-radius: 6px; min-height: 40px; }
  </style>
</head>
<body>
  <h1>ログイン済みメニュー</h1>

  <div class="card">
    <div>ユーザー: <strong id="current-user">(loading)</strong></div>
    <div>認証方法: <strong id="current-auth-method">(loading)</strong></div>
    <div>登録済みパスキー数: <strong id="credential-count">(loading)</strong></div>
  </div>

  <div class="card">
    <h2>2. パスキー登録</h2>
    <button id="register-passkey-button" type="button">このユーザーでパスキー登録</button>
  </div>

  <div class="card">
    <h2>3. ログアウト</h2>
    <button id="logout-button" type="button">ログアウト</button>
    <p>このボタンは画面遷移だけではなく、サーバ側で <code>HttpSession.invalidate()</code> を実行します。</p>
  </div>

  <div class="card">
    <h2>状態</h2>
    <div id="status" class="status">メニュー画面を読み込みました。</div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
